<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
        }

        .container {
            background: white;
            width: 400px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 6px 0;
        }

        button {
            background-color: #007bff;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Diabetes Prediction System</h2>

    <form method="POST">

        <input type="number" name="Pregnancies" placeholder="Pregnancies" min="0" required>
        <input type="number" name="Glucose" placeholder="Glucose" min="0" required>
        <input type="number" name="BloodPressure" placeholder="Blood Pressure" min="0" required>
        <input type="number" name="SkinThickness" placeholder="Skin Thickness" min="0" required>
        <input type="number" name="Insulin" placeholder="Insulin" min="0" required>
        <input type="number" step="any" name="BMI" placeholder="BMI" min="0" required>
        <input type="number" step="any" name="DiabetesPedigreeFunction" placeholder="Diabetes Pedigree Function" min="0" required>
        <input type="number" name="Age" placeholder="Age" min="0" required>

        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
        <div class="result">
            <h3>Result: {{ prediction }}</h3>
            <h4>Probability: {{ probability }}</h4>
        </div>
    {% endif %}

</div>

</body>
</html>
